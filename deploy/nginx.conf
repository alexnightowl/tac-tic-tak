events {}

http {
  include mime.types;
  server_tokens off;
  # Big enough for base64-encoded avatar uploads (backend caps at 6MB).
  client_max_body_size 8m;

  upstream backend { server backend:4000; }
  upstream frontend { server frontend:3000; }

  # ─────────────────────────────────────────────────────────────────
  # HTTP (port 80): serve Let's Encrypt ACME challenges, redirect all
  # other traffic to HTTPS on the canonical apex host.
  # ─────────────────────────────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name tactictak.online www.tactictak.online;

    # Certbot writes challenge files here during issuance/renewal.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://tactictak.online$request_uri;
    }
  }

  # ─────────────────────────────────────────────────────────────────
  # HTTPS www → apex redirect (keeps one canonical URL).
  # ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name www.tactictak.online;

    ssl_certificate     /etc/letsencrypt/live/tactictak.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tactictak.online/privkey.pem;

    return 301 https://tactictak.online$request_uri;
  }

  # ─────────────────────────────────────────────────────────────────
  # Main HTTPS server on the apex.
  # ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name tactictak.online;

    ssl_certificate     /etc/letsencrypt/live/tactictak.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tactictak.online/privkey.pem;

    # Safe modern defaults (Mozilla "intermediate").
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — tells browsers to never try HTTP again. 1 year.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Static assets served directly by the backend (avatars, etc).
    location /uploads/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Avatar URLs are cache-busted via ?v=<ts>, so we can cache hard.
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
