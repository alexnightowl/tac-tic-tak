events {}

http {
  include mime.types;
  server_tokens off;
  # Big enough for base64-encoded avatar uploads (backend caps at 6MB).
  client_max_body_size 8m;

  upstream backend { server backend:4000; }
  upstream frontend { server frontend:3000; }

  server {
    listen 80 default_server;
    server_name _;

    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Static assets served directly by the backend (avatars, etc).
    location /uploads/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Avatar URLs are cache-busted via ?v=<ts>, so we can cache hard.
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
