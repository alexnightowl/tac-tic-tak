name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm -r run typecheck
      - run: pnpm -r run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/tac-tic-tak
            git pull --ff-only
            docker compose --profile app build
            docker compose --profile app up -d --remove-orphans
            # nginx.conf is a bind-mount; `up -d` doesn't recreate the
            # container when only file content changes, and `nginx -s reload`
            # has proven flaky here. Force a clean recreate so the running
            # process reads the current conf on disk.
            docker compose --profile app up -d --force-recreate nginx
            # Log the first lines so the CI output tells us which conf is live.
            docker compose exec -T nginx sh -c 'sed -n "1,40p" /etc/nginx/nginx.conf' || true
            docker image prune -f
