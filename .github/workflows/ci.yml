name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm -r run typecheck
      - run: pnpm -r run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/tac-tic-tak
            git pull --ff-only
            docker compose --profile app build
            docker compose --profile app up -d --remove-orphans
            # nginx.conf is a bind-mount; `up -d` won't recreate the nginx
            # container when only its contents change, so force a reload so
            # route/size changes go live on the same deploy.
            docker compose exec -T nginx nginx -s reload || docker compose restart nginx
            docker image prune -f
